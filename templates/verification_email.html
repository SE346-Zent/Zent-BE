<!DOCTYPE html>
<html>
<head>
<title>Zent Verification</title>
</head>
<body>
    <h2>Welcome to Zent, {{name}}!</h2>
    <p>Thank you for registering. Please use the following 6-digit code to verify your email address:</p>
    
    <h3 id="otp-code" 
        style="background-color: #f4f4f4; padding: 10px; display: inline-block; border-radius: 5px; cursor: pointer; user-select: all;" 
        onclick="copyToClipboard()">
        {{code}}
    </h3>
    
    <p>This code will expire in 10 minutes.</p>
    <p>Please don't share this code with anyone.</p>

    <span id="copy-feedback" style="display: none; color: green; font-size: 14px; margin-left: 10px;">
        Copied!
    </span>


    <script>
        function copyToClipboard() {
            // 1. Get the text content of the element
            const codeElement = document.getElementById("otp-code");
            const codeText = codeElement.innerText;

            // 2. Use the modern Clipboard API to write the text
            navigator.clipboard.writeText(codeText).then(() => {
                // 3. Show visual feedback to the user
                const feedback = document.getElementById("copy-feedback");
                feedback.style.display = "inline-block";
                
                // Hide the feedback message after 2 seconds
                setTimeout(() => {
                    feedback.style.display = "none";
                }, 2000);
            }).catch(err => {
                console.error('Failed to copy text: ', err);
            });
        }
    </script>
</body>
</html>
