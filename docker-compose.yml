version: '3.8'

services:
  mysql:
    image: mysql
    container_name: core-database
    restart: unless-stopped
    ports:
      - "3308:3306"
    environment:
      MYSQL_ROOT_PASSWORD: HUNGDEPZAI
      MYSQL_DATABASE: ZentDB
      MYSQL_USER: admin
      MYSQL_PASSWORD: HUNGDEPZAI
    volumes:
      - mysql-data:/var/lib/mysql


volumes:
  mysql-data:
    name: zent_mysql_data